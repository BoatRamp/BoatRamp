name: microVM kernel + live boot

# Builds the reproducible `boatramp-vmlinux` microVM kernel and runs the
# `#[ignore]`d live VMM boot tests against it on a KVM-capable runner â€” the
# validation the fast CI can't do (it has no /dev/kvm and no kernel).
#
# GitHub-hosted `ubuntu-latest` exposes /dev/kvm (nested virtualization), so the
# embedded-VMM scratch-image test can actually boot a guest here. Manual + nightly
# (the build + boot is minutes, not seconds).
#
# STATUS: first cut. The kernel derivation (flake `#vmlinux`) and this job need to
# converge on CI â€” a Linux kernel build/boot can't be validated on the dev host.
# Iterate the `structuredExtraConfig` until the scratch-image test boots green,
# then wire signing + publish (see PLAN-dynamic-config S4).

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 5 * * *" # nightly, after the main nightly job

permissions:
  contents: read

jobs:
  vmlinux:
    name: build kernel + boot a microVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Confirm KVM is available
        run: |
          test -e /dev/kvm && echo "kvm present" || (echo "no /dev/kvm on this runner" && exit 1)
          ls -l /dev/kvm

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build the microVM kernel
        run: |
          nix build .#vmlinux --print-build-logs
          echo "BOATRAMP_TEST_KERNEL=$(realpath result/vmlinux)" >> "$GITHUB_ENV"
          file "$(realpath result/vmlinux)"

      - name: Host build deps (mke2fs for the scratch rootfs)
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - uses: dtolnay/rust-toolchain@stable

      # Primary gate: the kernel BOOTS. The serial-console test needs only the
      # kernel + /dev/kvm (no rootfs/net/init) and never hangs â€” it asserts the
      # kernel reaches its console + boots through to the root-fs mount. Enabling
      # build,backend,embedded is what compiles the test in (with `build` alone the
      # file is cfg'd out and the step passes on 0 tests); we assert â‰Ą1 test ran.
      - name: Boot the kernel to serial console (kernel-boot gate)
        run: |
          set -o pipefail
          timeout -k 30 360 sudo -E env "PATH=$PATH" "BOATRAMP_TEST_KERNEL=$BOATRAMP_TEST_KERNEL" \
            cargo test -p boatramp-firecracker --lib --features build,backend,embedded \
            boots_a_real_kernel_to_serial -- --ignored --nocapture 2>&1 | tee serial.log
          grep -qE 'running [1-9][0-9]* tests?' serial.log \
            || { echo "::error::serial boot ran 0 tests (embedded backend cfg'd out)" >&2; exit 1; }

      # Secondary (informational + timeout-bounded): the full buildâ†’bootâ†’initâ†’execâ†’
      # serve path. It exercises virtio-net + guest init, which do NOT work in the
      # GitHub Actions runner environment (tap/bridge/nested-virt) even though the
      # kernel boots â€” so this is not a hard gate here (validated locally, CB-3).
      - name: Full serve path (scratch-image; informational, timeout-bounded)
        continue-on-error: true
        run: |
          timeout -k 30 720 sudo -E env "PATH=$PATH" "BOATRAMP_TEST_KERNEL=$BOATRAMP_TEST_KERNEL" \
            cargo test -p boatramp-firecracker --features build,backend,embedded \
            --test embedded_backend_live -- --ignored --nocapture 2>&1 | tee boot-test.log || true
