name: CI

# Fast per-push / per-PR gate, split into parallel jobs so intra-day feedback is
# quick:
#   • quick          — instant source checks (fmt, typos, anyhow ban): no
#                       workspace compile, so a format nit or typo fails within
#                       seconds instead of behind a multi-minute clippy build.
#   • clippy         — workspace clippy, default features.
#   • feature-clippy — clippy the CLI's cfg-gated `serve` dispatch under the
#                      cluster+tls+acme-dns feature union (a light slice of
#                      --all-features) so a feature-combination regression fails
#                      the PR gate, not only nightly.
#   • test           — workspace tests, default features.
#   • deny           — cargo-deny bans/licenses/sources (+ non-blocking advisories).
# clippy and test are the two full workspace compiles; running them as separate
# jobs lets them build concurrently on separate runners instead of one after the
# other, roughly halving the critical path versus the old single-job pipeline.
#
# Per-push compiles are default features only (fs + SlateDB) plus the light
# feature-clippy slice — no wasmtime/openraft-heavy union, so each job is quick.
# The full --all-features clippy + test and the reproducible `nix flake check` run
# in the nightly workflow (.github/workflows/nightly.yml), or on demand via its
# workflow_dispatch; the heaviest feature-gated code is therefore covered nightly.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # A persistent cache can corrupt incremental state when a run is cancelled
  # mid-build; disable it (no benefit on a fresh CI checkout anyway).
  CARGO_INCREMENTAL: "0"
  # CI never debugs the binaries; dropping debug info keeps the target dir small.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  quick:
    name: fmt · typos · bans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # First-party code uses typed `thiserror` error enums only — the `anyhow`
      # crate is banned. It stays a *transitive* dep, so this is a source +
      # manifest guard (a cargo-deny ban would be infeasible).
      - name: Ban the anyhow crate
        run: |
          set -eo pipefail
          if grep -rnI --include='*.rs' -e 'anyhow' crates/; then
            echo "::error::the 'anyhow' crate is banned — use typed thiserror error enums"
            exit 1
          fi
          if grep -rn --include=Cargo.toml -e '\banyhow\b' crates/ Cargo.toml; then
            echo "::error::a Cargo.toml reintroduced the 'anyhow' dependency"
            exit 1
          fi

      # rustfmt only — no workspace build, so this lane stays sub-minute.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Typos
        uses: crate-ci/typos@master

  clippy:
    name: clippy (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # A transitive TLS backend (aws-lc-rs) can want cmake/nasm. Both are
      # preinstalled on the runner, so skip apt (and its flaky third-party repos)
      # unless they're genuinely missing.
      - name: Ensure build deps
        run: |
          if command -v cmake >/dev/null && command -v nasm >/dev/null; then
            echo "cmake + nasm already present"
          else
            sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy

      # Default features only (fs + SlateDB). The feature-gated backends
      # (tls / s3 / cluster / handlers / signers / …) are clippy'd nightly; the
      # `serve`-dispatch feature union is covered by `feature-clippy` below.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  feature-clippy:
    name: clippy (serve feature union)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # `tls` pulls aws-lc-rs (cmake/nasm); both are preinstalled on the runner.
      - name: Ensure build deps
        run: |
          if command -v cmake >/dev/null && command -v nasm >/dev/null; then
            echo "cmake + nasm already present"
          else
            sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: feature-clippy

      # The CLI's `serve` dispatch is cfg-gated per TLS/cluster feature — the
      # `match args.tls` arms and the `serve::Error` `#[from]` variants differ by
      # feature. Default-features CI can't see those combinations, so a
      # feature-union regression (a missing `TlsMode::Rpk` arm, a colliding
      # `From<RpkError>`/`From<MeshError>`) previously only surfaced nightly. Clippy
      # the `cluster + tls + acme-dns` union of just the `boatramp` crate per-push
      # to catch it in the PR gate. This is a light slice — no wasmtime/handlers, no
      # cloud-signer SDKs, no s3/compute — so it stays quick; the full
      # `--all-features` clippy + test remains the nightly backstop.
      - name: Clippy (cluster + tls + acme-dns)
        run: cargo clippy -p boatramp --features cluster,tls,acme-dns --all-targets -- -D warnings

  test:
    name: test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Ensure build deps
        run: |
          if command -v cmake >/dev/null && command -v nasm >/dev/null; then
            echo "cmake + nasm already present"
          else
            sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: Test
        run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bans, licenses, sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
      # Advisories are reported but non-blocking: some transitive dependencies
      # carry unmaintained/DoS notices with no upstream fix yet (tracked in
      # deny.toml). Surfacing them keeps them visible without gating every PR.
      - name: Advisories (non-blocking)
        uses: EmbarkStudios/cargo-deny-action@v2
        continue-on-error: true
        with:
          command: check advisories
