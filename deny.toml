# cargo-deny configuration. Run `just deny` (or `cargo deny check`).
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = [
  # Both advisories below are "unmaintained" notices (not vulnerabilities) on
  # transitive deps pulled in via slatedb -> foyer (its block cache); we don't
  # depend on either directly and no safe upgrade exists. Revisit when
  # foyer/slatedb drop them.
  "RUSTSEC-2024-0436", # paste: compile-time-only proc-macro, archived upstream
  "RUSTSEC-2025-0141", # bincode 1.3.3: development ceased; 1.3.3 is "complete"

  # rustls-pemfile: unmaintained (folded into rustls-pki-types). Transitive via
  # the TLS stacks below; no direct dep. Drops out when they bump.
  "RUSTSEC-2025-0134",

  # rustls-webpki cert/CRL edge cases, fixed in >=0.103.10 — which reqwest
  # already uses (0.103.13). The flagged older lines are pinned transitively and
  # can't be bumped here: 0.102.8 via libsql -> hyper-rustls 0.25/rustls 0.22,
  # 0.101.7 via the aws-sdk (s3 feature) -> rustls 0.21. Limited impact (the
  # advisories note an attacker must compromise a trusted issuing authority).
  # Revisit when libsql / aws-sdk move to rustls 0.23.
  "RUSTSEC-2026-0049", # CRL distribution-point matching
  "RUSTSEC-2026-0098", # name constraints for URI names
  "RUSTSEC-2026-0099", # name constraints with wildcard names
  "RUSTSEC-2026-0104", # panic in CRL parsing

  # quick-xml (0.38.4) memory-exhaustion / quadratic-parse DoS. Transitive via
  # slatedb -> object_store, which pins `quick-xml ^0.38`; no released object_store
  # yet uses the fixed quick-xml >=0.41 (0.14.0 is on 0.40.1, still flagged, and it
  # additionally pulls a *yanked* spin + crossbeam-epoch — a net-worse tree), so
  # there is no clean bump. Reachable only when SlateKv is backed by a cloud object
  # store (S3/R2/GCS) that returns malicious LIST XML — not the default local-FS
  # KV. Revisit when object_store ships quick-xml >=0.41.
  "RUSTSEC-2026-0194", # quick-xml: quadratic duplicate-attribute-name check
  "RUSTSEC-2026-0195", # quick-xml: unbounded NsReader namespace allocation

  # crossbeam-epoch (0.9.18): invalid pointer deref in the `fmt::Pointer`/`Debug`
  # impls for `Atomic`/`Shared` — only triggered by *formatting* a null-created
  # epoch pointer. Transitive via slatedb -> crossbeam-skiplist (its memtable),
  # which never Debug-prints those pointers, so the path is unreachable. No safe
  # upgrade (0.9.18 is the current line). Revisit when crossbeam-epoch patches.
  "RUSTSEC-2026-0204",

  # rsa (0.9.10) "Marvin" RSA-decryption timing side-channel. Present ONLY with
  # the opt-in `sql-mysql` feature (not the default graph): sqlx-mysql pulls `rsa`
  # solely for MySQL's sha256/caching_sha2 auth, where the *client* RSA-**encrypts**
  # the password during a non-TLS handshake. Marvin targets the private-key
  # *decryptor* (the MySQL server), an operation boatramp never performs — and a
  # TLS connection skips the RSA exchange entirely. No fixed `rsa` release exists.
  # Revisit when RustCrypto/RSA ships a constant-time release or sqlx drops it.
  "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The internal workspace crates are referenced by path (no version), which the
# wildcard check would otherwise flag.
allow-wildcard-paths = true

[licenses]
version = 2
# Permissive licenses we are happy to depend on. Add more as the tree grows
# (run `cargo deny check licenses` to see what is needed).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "BSL-1.0",
  "0BSD",
  "CC0-1.0",
  "MPL-2.0",
  # Permissive data license (e.g. bundled CA / IANA data sets).
  "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
